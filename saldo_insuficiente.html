$=v=>(v<0?'-$ ':'$ ')+

let hpb=hStart?Math.floor(20*Math.min(1,(Date.now()-hStart)/1500)):0

}

}

nw-lastTap<350){

}

}

e.key=='Backspace')

&&P.length>1)return S()
if(m==1){
let nw=Date.now()
if(lastTap&&
nw-lastTap<350){
lastTap=0
return RM()

}

}
