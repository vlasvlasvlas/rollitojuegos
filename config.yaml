    finales:
      todes: "ENTRARON ENTERES AL RECITAL"
      mayoria: "ENTRARON {N} DE {TOTAL}. EL RESTO SE PERDIO EL SHOW"
      uno: "{NOMBRE} VIO LA BANDA SOLE"
      ninguno: "LA BANDA TOCO SIN PUBLICO"
    tramos:
      - lugar: "EL BARRIO"
        narrativa: "SALIDA TEMPRANA, BUSCAN AL GRUPO"
        rango_costo: [200, 400]
