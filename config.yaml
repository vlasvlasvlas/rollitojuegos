      uno: "{NOMBRE} LLEGO SOLE A LA PLAZA"
      ninguno: "LA MARCHA SIGUIO SIN ELLES"
    tramos:
      - lugar: "PLAZA DEL BARRIO"
        narrativa: "PUNTO DE ENCUENTRO"
        rango_costo: [200, 400]
      - lugar: "AVENIDA PRINCIPAL"
        narrativa: "PRIMERA COMBINACION"
        rango_costo: [300, 500]
      - lugar: "ENTRE RIOS"
        narrativa: "EL BONDI SE LLENA DE GENTE"
        rango_costo: [350, 600]
      - lugar: "CONGRESO"
        narrativa: "CONCENTRACION FRENTE AL CONGRESO"
        rango_costo: [400, 700]
      - lugar: "AVENIDA DE MAYO"
        narrativa: "LA MARCHA AVANZA"
